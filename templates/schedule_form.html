{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 0.5rem;">Schedule Session</h2>
    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Set a time and location for your session.</p>
    
    <form method="POST">
        <div class="form-group">
            <label for="meeting_datetime">Date and Time</label>
            <input type="datetime-local" id="meeting_datetime" name="meeting_datetime" class="form-control" 
                value="{{ req.meeting_datetime.strftime('%Y-%m-%dT%H:%M') if req.meeting_datetime else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="meeting_link">Meeting Link (e.g. Google Meet, Zoom)</label>
            <input type="url" id="meeting_link" name="meeting_link" class="form-control" 
                value="{{ req.meeting_link or '' }}" required placeholder="https://meet.google.com/xxx-xxxx-xxx">
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <a href="/requests" class="btn btn-outline" style="flex: 1; justify-content: center;">Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Save Schedule</button>
        </div>
    </form>
</div>
{% endblock %}
