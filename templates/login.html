{% extends 'base.html' %}

{% block content %}
<div class="card auth-container">
    <h2>Welcome Back</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign Up</a>
    </p>
</div>
{% endblock %}
