{% extends 'base.html' %}

{% block content %}
<div class="card auth-container">
    <h2>Create an Account</h2>
    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Choose a unique username">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Create a strong password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Log In</a>
    </p>
</div>
{% endblock %}
