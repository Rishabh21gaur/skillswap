{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 0.5rem;">Review Your Session</h2>
    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Leave feedback for your session with <strong>{{ reviewee.username }}</strong>.</p>
    
    <form method="POST">
        <div class="form-group">
            <label for="rating">Rating (1-5 Stars)</label>
            <select id="rating" name="rating" class="form-control" required>
                <option value="5">5 - Excellent, very helpful</option>
                <option value="4">4 - Very good</option>
                <option value="3">3 - Good, met expectations</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor, not helpful</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="comment">Review Comment</label>
            <textarea id="comment" name="comment" class="form-control" rows="4" placeholder="How was the session? What did you learn?" required></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <a href="/requests" class="btn btn-outline" style="flex: 1; justify-content: center;">Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Submit Review</button>
        </div>
    </form>
</div>
{% endblock %}
